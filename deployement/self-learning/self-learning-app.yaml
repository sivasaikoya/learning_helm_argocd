apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: self-learning
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sivasaikoya/learning_helm_argocd.git
    targetRevision: HEAD
    path: deployement/self-learning
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: self-learning

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true